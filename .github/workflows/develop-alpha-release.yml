name: Develop Alpha Release

on:
  push:
    branches:
      - develop

permissions:
  contents: write

concurrency:
  group: develop-alpha-release
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.1
  PROJECT_NAME: HugeBuildup

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: npm install

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    needs: release
    if: ${{ needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y unzip zip p7zip-full

      - name: Download Godot editor and export templates
        run: |
          mkdir -p .ci/godot ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          curl -L -o .ci/godot/godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -L -o .ci/godot/templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q .ci/godot/godot.zip -d .ci/godot/editor
          unzip -q .ci/godot/templates.tpz -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          chmod +x .ci/godot/editor/Godot_v${GODOT_VERSION}-stable_linux.x86_64

      - name: Export release builds
        run: |
          mkdir -p dist/windows dist/linux dist/macos build/windows build/linux build/macos
          .ci/godot/editor/Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path . --export-release "Windows Desktop" "build/windows/${PROJECT_NAME}.exe"
          .ci/godot/editor/Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path . --export-release "Linux/BSD" "build/linux/${PROJECT_NAME}.x86_64"
          .ci/godot/editor/Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path . --export-release "macOS" "build/macos/${PROJECT_NAME}.zip"

      - name: Package platform archives
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          cp VERSION dist/VERSION.txt
          cp CHANGELOG.md dist/CHANGELOG.md
          (
            cd build/windows
            zip -9 -r "../../dist/${PROJECT_NAME}-${VERSION}-windows.zip" .
          )
          (
            cd build/linux
            tar -czf "../../dist/${PROJECT_NAME}-${VERSION}-linux.tar.gz" .
          )
          cp "build/macos/${PROJECT_NAME}.zip" "dist/${PROJECT_NAME}-${VERSION}-macos.zip"

      - name: Create GitHub pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release.outputs.tag }}" \
            "dist/${PROJECT_NAME}-${{ needs.release.outputs.version }}-windows.zip" \
            "dist/${PROJECT_NAME}-${{ needs.release.outputs.version }}-linux.tar.gz" \
            "dist/${PROJECT_NAME}-${{ needs.release.outputs.version }}-macos.zip" \
            --repo "${{ github.repository }}" \
            --clobber
